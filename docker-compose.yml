services:
  holidaycheck:
    image: ghcr.io/mschoettli/holidaycheck:latest
    pull_policy: build
    build:
      context: https://github.com/mschoettli/holidaycheck.git#main
      dockerfile: Dockerfile
      no_cache: true
      args:
        HOLIDAYCHECK_BUILD_REVISION: "auto"
    container_name: holidaycheck
    ports:
      - "${HOLIDAYCHECK_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      HOST: "0.0.0.0"
      PORT: "3000"
      DATA_DIR: "/app/data"
      HOLIDAYCHECK_LANGUAGE: "${HOLIDAYCHECK_LANGUAGE:-de}"
      WATCHTOWER_URL: "http://watchtower:8080/v1/update"
      WATCHTOWER_HTTP_API_TOKEN: "${WATCHTOWER_HTTP_API_TOKEN:-holidaycheck-update-token}"
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    volumes:
      - holidaycheck_data:/app/data
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower:latest
    container_name: holidaycheck-watchtower
    environment:
      TZ: "${TZ:-Europe/Zurich}"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_SCHEDULE: "${WATCHTOWER_SCHEDULE:-0 0 4 * * *}"
      WATCHTOWER_HTTP_API_UPDATE: "true"
      WATCHTOWER_HTTP_API_TOKEN: "${WATCHTOWER_HTTP_API_TOKEN:-holidaycheck-update-token}"
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  holidaycheck_data:
