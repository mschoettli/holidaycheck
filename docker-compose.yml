services:
  holidaycheck:
    build: .
    container_name: holidaycheck
    ports:
      - "${HOLIDAYCHECK_PORT:-3000}:3000"
    environment:
      HOST: "0.0.0.0"
      PORT: "3000"
      SESSION_TTL_SECONDS: "${SESSION_TTL_SECONDS:-86400}"
      HOLIDAYCHECK_USER_1_EMAIL: "${HOLIDAYCHECK_USER_1_EMAIL:?Set HOLIDAYCHECK_USER_1_EMAIL in .env or Dockge environment}"
      HOLIDAYCHECK_USER_1_PASSWORD: "${HOLIDAYCHECK_USER_1_PASSWORD:?Set HOLIDAYCHECK_USER_1_PASSWORD in .env or Dockge environment}"
      HOLIDAYCHECK_USER_2_EMAIL: "${HOLIDAYCHECK_USER_2_EMAIL:-}"
      HOLIDAYCHECK_USER_2_PASSWORD: "${HOLIDAYCHECK_USER_2_PASSWORD:-}"
      HOLIDAYCHECK_USER_3_EMAIL: "${HOLIDAYCHECK_USER_3_EMAIL:-}"
      HOLIDAYCHECK_USER_3_PASSWORD: "${HOLIDAYCHECK_USER_3_PASSWORD:-}"
      HOLIDAYCHECK_USER_4_EMAIL: "${HOLIDAYCHECK_USER_4_EMAIL:-}"
      HOLIDAYCHECK_USER_4_PASSWORD: "${HOLIDAYCHECK_USER_4_PASSWORD:-}"
      HOLIDAYCHECK_USER_5_EMAIL: "${HOLIDAYCHECK_USER_5_EMAIL:-}"
      HOLIDAYCHECK_USER_5_PASSWORD: "${HOLIDAYCHECK_USER_5_PASSWORD:-}"
    restart: unless-stopped
